name: Build

on:
  push:
    branches: [main, master, 0215-port-to-qt]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build .app with PyInstaller
        run: |
          uv run pyinstaller --windowed --name qtProperTree \
            --icon propertree/shortcut.icns \
            --osx-bundle-identifier com.steveparson.qtpropertree \
            --add-data "propertree/menu.plist:propertree" \
            --add-data "propertree/snapshot.plist:propertree" \
            --add-data "propertree/shortcut.icns:propertree" \
            --add-data "propertree/shortcut.ico:propertree" \
            main.py

      - name: Create .dmg
        run: hdiutil create -volname qtProperTree -srcfolder dist/qtProperTree.app -ov -format UDZO dist/qtProperTree-${{ matrix.arch }}.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtProperTree-macOS-${{ matrix.arch }}
          path: dist/qtProperTree-${{ matrix.arch }}.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --group dev
          sudo apt-get install -y imagemagick

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --name qtProperTree \
            --add-data "propertree/menu.plist:propertree" \
            --add-data "propertree/snapshot.plist:propertree" \
            --add-data "propertree/shortcut.icns:propertree" \
            --add-data "propertree/shortcut.ico:propertree" \
            main.py

      - name: Create AppDir
        run: |
          mkdir -p AppDir
          cp -r dist/qtProperTree AppDir/
          convert 'propertree/shortcut.ico[0]' AppDir/qtProperTree.png
          printf '[Desktop Entry]\nName=qtProperTree\nExec=qtProperTree\nIcon=qtProperTree\nType=Application\nCategories=Utility;\n' \
            > AppDir/qtProperTree.desktop
          printf '#!/bin/bash\nHERE=$(dirname "$(readlink -f "$0")")\nexec "$HERE/qtProperTree/qtProperTree" "$@"\n' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir qtProperTree-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtProperTree-Linux-x86_64
          path: qtProperTree-x86_64.AppImage

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Update release tag to current commit
        run: |
          git tag -f build-${{ steps.date.outputs.date }}
          git push origin -f build-${{ steps.date.outputs.date }}

      - name: Extract changelog section
        id: changelog
        run: |
          body=$(awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qtProperTree-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}
          name: Build ${{ steps.date.outputs.date }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            *.dmg
            *.AppImage
          prerelease: true
