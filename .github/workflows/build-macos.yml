name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build .app with PyInstaller
        run: |
          uv run pyinstaller --windowed --name qtProperTree \
            --icon propertree/shortcut.icns \
            --osx-bundle-identifier com.steveparson.qtpropertree \
            --add-data "propertree/menu.plist:propertree" \
            --add-data "propertree/snapshot.plist:propertree" \
            --add-data "propertree/settings.json:propertree" \
            --add-data "propertree/shortcut.icns:propertree" \
            --add-data "propertree/shortcut.ico:propertree" \
            main.py

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtProperTree-macOS
          path: dist/qtProperTree.app
