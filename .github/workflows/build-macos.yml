name: Build macOS App

on:
  push:
    branches: [main, master, 0215-port-to-qt]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build .app with PyInstaller
        run: |
          uv run pyinstaller --windowed --name qtProperTree \
            --icon propertree/shortcut.icns \
            --osx-bundle-identifier com.steveparson.qtpropertree \
            --add-data "propertree/menu.plist:propertree" \
            --add-data "propertree/snapshot.plist:propertree" \
            --add-data "propertree/shortcut.icns:propertree" \
            --add-data "propertree/shortcut.ico:propertree" \
            main.py

      - name: Create .dmg
        run: hdiutil create -volname qtProperTree -srcfolder dist/qtProperTree.app -ov -format UDZO dist/qtProperTree.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtProperTree-macOS
          path: dist/qtProperTree.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.ref_name }}@${{ github.sha }}
          files: dist/qtProperTree.dmg
          prerelease: true
